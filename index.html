<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Correo - O4IT Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #151820; --border: #252a36;
    --accent: #00c2ff; --accent2: #ff6b35; --text: #e8eaf0;
    --muted: #6b7280; --success: #22c55e; --input-bg: #1a1e2b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header .badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; border: 1px solid var(--accent); display: inline-block; padding: 4px 12px; margin-bottom: 12px; }
  .header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
  .header p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .container { max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .panel-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .panel-title::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; margin-top: 12px; font-weight: 500; letter-spacing: 0.5px; }
  label:first-of-type { margin-top: 0; }
  input, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; padding: 9px 12px; transition: border-color 0.2s; outline: none; }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  .cc-info { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); background: #0d0f14; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; line-height: 1.8; }
  .cc-info span { color: var(--accent); }
  .btn-generate { grid-column: 1 / -1; background: var(--accent); color: #000; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border: none; border-radius: 6px; padding: 14px; cursor: pointer; width: 100%; transition: all 0.2s; }
  .btn-generate:hover { background: #33ccff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,194,255,0.25); }
  .output-section { max-width: 860px; margin: 20px auto 0; display: none; }
  .output-section.visible { display: block; }
  .output-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .output-block-header { background: #1a1e2b; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .output-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .copy-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }
  .output-content { padding: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; line-height: 1.75; color: #c8cdd8; white-space: pre-wrap; word-break: break-word; }
  .btn-copy-all { width: 100%; background: transparent; border: 1px solid var(--accent2); color: var(--accent2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .btn-copy-all:hover { background: var(--accent2); color: #000; }
  .btn-reset { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }
  @media (max-width: 600px) { .container { grid-template-columns: 1fr; } .btn-generate { grid-column: 1; } }
</style>
</head>
<body>

<div class="header">
  <div class="badge">O4IT &middot; Preventa</div>
  <h1>Generador de Correo de Oferta</h1>
  <p>Completa los campos y obtén asunto + cuerpo listos para copiar</p>
</div>

<div class="container">

  <div class="panel">
    <div class="panel-title">Comercial (SAM)</div>
    <label>Nombre del SAM / Comercial</label>
    <input type="text" id="samNombre" placeholder="Ej: Tatiana Blandon" />
  </div>

  <div class="panel">
    <div class="panel-title">CC (ingresar en Outlook)</div>
    <div class="cc-info">
      <span>Luz Alejandra Alferez</span><br>
      <span>Luis Umbarila</span><br>
      <span>Diana Romero</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Oportunidad (OPP)</div>
    <label># OPP</label>
    <input type="text" id="oppNum" placeholder="Ej: OPP26000154" />
    <label>Nombre / Titulo OPP</label>
    <input type="text" id="oppNombre" placeholder="Ej: AV_v1" />
    <label>Cliente</label>
    <input type="text" id="cliente" placeholder="Ej: ITOS" />
  </div>

  <div class="panel">
    <div class="panel-title">Quote</div>
    <label># Quote (QTE)</label>
    <input type="text" id="qteNum" placeholder="Ej: QTE26000109" />
    <label>Notas adicionales <span style="color:var(--muted);font-weight:300">(opcional, una por linea)</span></label>
    <textarea id="notasExtra" placeholder="Ej: Precios contemplan facturacion a traves de O4IT LLC"></textarea>
  </div>

  <button class="btn-generate" id="btnGenerar">&#9889; Generar Correo</button>

</div>

<div class="output-section" id="outputSection">

  <div class="output-block">
    <div class="output-block-header">
      <span class="output-label">Asunto</span>
      <button class="copy-btn" data-target="outAsunto">Copiar</button>
    </div>
    <div class="output-content" id="outAsunto"></div>
  </div>

  <div class="output-block">
    <div class="output-block-header">
      <span class="output-label">Cuerpo del correo</span>
      <button class="copy-btn" data-target="outCuerpo">Copiar</button>
    </div>
    <div class="output-content" id="outCuerpo"></div>
  </div>

  <button class="btn-copy-all" id="btnCopiarTodo">Copiar todo (asunto + cuerpo)</button>
  <button class="btn-reset" id="btnReset">Nuevo correo</button>

</div>

<script>
(function() {

  function generar() {
    var samNombre  = document.getElementById('samNombre').value.trim();
    var oppNum     = document.getElementById('oppNum').value.trim();
    var oppNombre  = document.getElementById('oppNombre').value.trim();
    var cliente    = document.getElementById('cliente').value.trim();
    var qteNum     = document.getElementById('qteNum').value.trim();
    var notasExtra = document.getElementById('notasExtra').value.trim();

    var requeridos = { 'Nombre SAM': samNombre, '# OPP': oppNum, 'Nombre OPP': oppNombre, 'Cliente': cliente, '# QTE': qteNum };
    for (var campo in requeridos) {
      if (!requeridos[campo]) { alert('Falta: ' + campo); return; }
    }

    var asunto = oppNum + ' ' + oppNombre + ' - Cliente: ' + cliente + ' - OFERTA';

    var lineasExtra = notasExtra ? notasExtra.split('\n').filter(function(l){ return l.trim(); }) : [];
    var notasBloque = '';
    lineasExtra.forEach(function(l, i) { notasBloque += (i + 1) + '. ' + l.trim() + '\n'; });
    var numFija = lineasExtra.length + 1;

    var primerNombre = samNombre.split(' ')[0];
    var cuerpo = 'Buen dia, ' + primerNombre + '\n\n'
      + 'Adjunto propuesta comercial, ' + qteNum + ' verificado. ' + asunto + '\n\n\n'
      + 'Nota:\n'
      + notasBloque
      + numFija + '. Agradezco validar la totalidad de la oferta, los datos de cliente y datos de SAM. Con el fin de enviarla en PDF, a quien corresponda, despues de su revision.\n\n\n'
      + 'Quedo atento.';

    document.getElementById('outAsunto').textContent = asunto;
    document.getElementById('outCuerpo').textContent = cuerpo;

    var sec = document.getElementById('outputSection');
    sec.classList.add('visible');
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copiar(targetId, btn) {
    var text = document.getElementById(targetId).textContent;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'Copiado';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copiarTodo() {
    var asunto = document.getElementById('outAsunto').textContent;
    var cuerpo = document.getElementById('outCuerpo').textContent;
    var todo = 'ASUNTO: ' + asunto + '\n\n---\n\n' + cuerpo;
    navigator.clipboard.writeText(todo).then(function() {
      var btn = document.getElementById('btnCopiarTodo');
      btn.textContent = 'Copiado al portapapeles';
      setTimeout(function() { btn.textContent = 'Copiar todo (asunto + cuerpo)'; }, 2500);
    });
  }

  function resetear() {
    ['samNombre','oppNum','oppNombre','cliente','qteNum','notasExtra'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('outputSection').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('btnGenerar').addEventListener('click', generar);
  document.getElementById('btnCopiarTodo').addEventListener('click', copiarTodo);
  document.getElementById('btnReset').addEventListener('click', resetear);

  document.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      copiar(btn.getAttribute('data-target'), btn);
    });
  });

  document.querySelectorAll('input').forEach(function(inp) {
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') generar(); });
  });

})();
</script>
</body>
</html>
